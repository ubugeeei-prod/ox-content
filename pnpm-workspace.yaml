packages:
  - crates/ox_content_napi
  - crates/ox_content_wasm/pkg
  - npm/*
  - docs
  - deploy
  - examples/*
  - benchmarks/*
  - benchmarks/bundle-size/apps/*

catalog:
  "@sveltejs/vite-plugin-svelte": ^7.1.2
  "@types/node": ^26.1.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.0.0
  "@vitejs/plugin-react": ^6.0.3
  "@vitejs/plugin-vue": ^6.0.7
  "@typescript/native-preview": ^7.0.0-dev.20260705.1
  esbuild: ^0.28.1
  react: ^19.0.0
  react-dom: ^19.0.0
  svelte: ^5.56.4
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.1.21
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.21
  vue: ^3.5.39
  vite-plus: 0.2.2

onlyBuiltDependencies:
  - esbuild
  - sharp
  - puppeteer
packageExtensions:
  "@voidzero-dev/vite-plus-core@0.1.21":
    dependencies:
      picomatch: ^4.0.4
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
