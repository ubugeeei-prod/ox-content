name: Benchmark docs

# Regenerate the Markdown benchmark tables (README.md, docs/content/performance.md)
# and the SVG charts (docs/public/benchmark-*.svg) from a clean CI environment,
# and export the refreshed files as a patch artifact. Running on a consistent
# runner keeps the committed numbers comparable across refreshes — local
# machines vary too much to be the source of truth.
#
# The refresh used to open a pull request directly, but this repository's
# Actions policy neither allowlists peter-evans/create-pull-request nor lets
# workflows create pull requests (can_approve_pull_request_reviews is off).
# A maintainer downloads the artifact and applies it:
#   gh run download <run-id> -n benchmark-docs-refresh
#   git apply benchmark-docs-refresh.patch

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Median of N benchmark runs"
        type: string
        default: "7"
  schedule:
    # Weekly, Monday 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  OX_CONTENT_BENCHMARK_RUNNER: blacksmith-32vcpu-ubuntu-2404
  STICKY_CACHE_SCOPE: ${{ github.ref_name }}

jobs:
  refresh:
    name: Refresh benchmark docs
    # Highest Blacksmith tier (32 vCPU, whole bare-metal host) — best single-thread
    # performance and host isolation for stable numbers, and matches the runner used
    # by benchmark.yml so committed numbers track the PR-benchmark environment.
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Mount sticky cache
        uses: ./.github/actions/mount-sticky-cache
        with:
          key-prefix: ${{ github.repository }}-benchmark-docs-${{ github.job }}-${{ env.STICKY_CACHE_SCOPE }}
          cargo: "true"
          target: target

      # The render comparison includes `Bun.markdown.html`, available only in
      # Bun >= 1.3.8. Pin a version that ships the API so the row is always
      # present (matches .github/workflows/benchmark.yml).
      - name: Setup Bun
        # oven-sh/setup-bun is outside this repo's allowed-actions policy, so
        # every workflow that referenced it died with a startup_failure before
        # any job ran. Install the same pinned Bun through npm (Node is set up
        # by the preceding Setup Vite+ step) instead of widening the policy.
        run: npm install --global bun@1.3.14

      - name: Regenerate benchmark docs
        run: vp run bench:docs
        env:
          OX_CONTENT_BENCHMARK_RUNS: ${{ github.event.inputs.runs || '7' }}

      - name: Export refreshed docs as a patch
        run: |
          git add README.md docs/content/performance.md \
            docs/public/benchmark-parse.svg docs/public/benchmark-render.svg \
            docs/public/benchmark-parse-huge.svg docs/public/benchmark-render-huge.svg
          git diff --cached --stat
          git diff --cached --binary > "$RUNNER_TEMP/benchmark-docs-refresh.patch"

      - name: Upload patch artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-docs-refresh
          path: ${{ runner.temp }}/benchmark-docs-refresh.patch
          if-no-files-found: error
          retention-days: 14
