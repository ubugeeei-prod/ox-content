name: Benchmark docs

# Regenerate the Markdown benchmark tables (README.md, docs/content/performance.md)
# and the SVG charts (docs/public/benchmark-*.svg) from a clean CI environment,
# then open a pull request with the refreshed numbers. Running on a consistent
# runner keeps the committed numbers comparable across refreshes — local
# machines vary too much to be the source of truth.

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Median of N benchmark runs"
        type: string
        default: "7"
  schedule:
    # Weekly, Monday 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  refresh:
    name: Refresh benchmark docs
    # Highest Blacksmith tier (32 vCPU, whole bare-metal host) — best single-thread
    # performance and host isolation for stable numbers, and matches the runner used
    # by benchmark.yml so committed numbers track the PR-benchmark environment.
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # The render comparison includes `Bun.markdown.html`, available only in
      # Bun >= 1.3.8. Pin a version that ships the API so the row is always
      # present (matches .github/workflows/benchmark.yml).
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Build native binding
        run: vp run build:npm

      - name: Run benchmark sweep
        run: node benchmarks/bundle-size/parse-benchmark.mjs --runs "${RUNS}" --json "${RUNNER_TEMP}/bench.json"
        env:
          RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.runs || '7' }}

      - name: Regenerate tables
        run: node scripts/render-benchmark-tables.mjs "${RUNNER_TEMP}/bench.json"

      - name: Regenerate charts
        run: |
          node scripts/render-benchmark-charts.mjs "${RUNNER_TEMP}/bench.json" --size large
          node scripts/render-benchmark-charts.mjs "${RUNNER_TEMP}/bench.json" --size huge

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "docs: refresh benchmark numbers"
          branch: ci/benchmark-docs-refresh
          delete-branch: true
          title: "docs: refresh benchmark numbers"
          body: |
            Automated refresh of the Markdown benchmark tables and charts from the
            Benchmark docs workflow (`blacksmith-32vcpu-ubuntu-2404` runner, Bun 1.3.14
            so the `Bun.markdown.html` row is included).

            Updated:
            - `README.md` and `docs/content/performance.md` benchmark tables
            - `docs/public/benchmark-*.svg` charts

            Numbers track the runner; the relative ordering between engines is the
            stable signal. Review the deltas before merging.
          labels: documentation
          add-paths: |
            README.md
            docs/content/performance.md
            docs/public/benchmark-parse.svg
            docs/public/benchmark-render.svg
            docs/public/benchmark-parse-huge.svg
            docs/public/benchmark-render-huge.svg
