name: Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Benchmark
    runs-on: blacksmith-32vcpu-ubuntu-2404
    env:
      CARGO_TARGET_DIR: /tmp/ox-content-cargo-target
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: .benchmark/base
          persist-credentials: false

      - name: Checkout head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: .benchmark/head
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Benchmark base
        working-directory: .benchmark/base
        run: node "$GITHUB_WORKSPACE/.github/scripts/run-pr-benchmark.mjs" --source "$GITHUB_WORKSPACE" --runtime-json "$RUNNER_TEMP/benchmark-base.json" --bundle-json "$RUNNER_TEMP/bundle-base.json"

      - name: Benchmark head
        working-directory: .benchmark/head
        run: node "$GITHUB_WORKSPACE/.github/scripts/run-pr-benchmark.mjs" --source "$GITHUB_WORKSPACE" --runtime-json "$RUNNER_TEMP/benchmark-head.json" --bundle-json "$RUNNER_TEMP/bundle-head.json"

      - name: Compare benchmarks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OX_CONTENT_BENCHMARK_ALLOW_REGRESSION: ${{ contains(github.event.pull_request.labels.*.name, 'benchmark-regression-accepted') && '1' || '0' }}
        working-directory: .benchmark/head
        run: node "$GITHUB_WORKSPACE/.github/scripts/compare-pr-benchmark.mjs"

      - name: Upload benchmark comment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-comment
          path: ${{ runner.temp }}/benchmark-comment.md
          if-no-files-found: error
          retention-days: 1

  comment:
    name: Comment
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs: benchmark
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Download benchmark comment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: benchmark-comment
          path: ${{ runner.temp }}

      - name: Comment on pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COMMENT_PATH: ${{ runner.temp }}/benchmark-comment.md
        run: node "$GITHUB_WORKSPACE/.github/scripts/comment-pr-benchmark.mjs"
