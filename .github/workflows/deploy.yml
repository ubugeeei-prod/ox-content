name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  STICKY_CACHE_SCOPE: ${{ github.ref_name }}

jobs:
  build:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@329490fff19dd4ecd8ff2a74d7c45bee0448f3a6 # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: true

      - name: Mount sticky cache
        uses: ./.github/actions/mount-sticky-cache
        with:
          key-prefix: ${{ github.repository }}-deploy-${{ github.job }}-${{ env.STICKY_CACHE_SCOPE }}
          cargo: "true"
          target: target
          browsers: "true"

      - name: Install browsers for docs rendering
        run: |
          vp exec --filter @ox-content/vite-plugin -- playwright install --with-deps chromium
          vp exec --filter @ox-content/vite-plugin -- puppeteer browsers install chrome-headless-shell

      - name: Build
        run: vp build

      - name: Prepare deployment directory
        run: |
          mkdir -p dist
          # Copy docs site to root
          cp -r docs/dist/docs/* dist/
          # Copy Rust API docs
          cp -r target/doc dist/api
          # Copy playground
          cp -r examples/playground/dist dist/playground
          # Add .nojekyll
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
