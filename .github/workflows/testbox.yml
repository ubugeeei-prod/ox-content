name: Testbox

# Blacksmith testbox. `blacksmith testbox warmup --workflow testbox.yml` dispatches
# this workflow with a testbox_id; the job provisions the same toolchain as CI
# (Vite+, Rust, docs-rendering browsers) and then hands control to run-testbox,
# which rsyncs your local working tree into the microVM. From there you can run
# `vp test` / `vp lint` / `vp build` against the real CI environment in seconds.
on:
  workflow_dispatch:
    inputs:
      testbox_id:
        description: "Testbox session ID (from `blacksmith testbox warmup`)"
        type: string
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  STICKY_CACHE_SCOPE: ${{ github.ref_name }}
  # begin-testbox / run-testbox are JavaScript actions that require Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  testbox:
    name: Testbox
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Begin Testbox
        uses: useblacksmith/begin-testbox@233448af4bfdc6fca509a7f0974411ac6d8a8043 # v2
        with:
          testbox_id: ${{ inputs.testbox_id }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: true

      # Keep benchmark testboxes aligned with benchmark.yml and
      # benchmark-docs.yml so Bun.markdown.html is included in local remote runs.
      - name: Setup Bun
        # oven-sh/setup-bun is outside this repo's allowed-actions policy, so
        # every workflow that referenced it died with a startup_failure before
        # any job ran. Install the same pinned Bun through npm (Node is set up
        # by the preceding Setup Vite+ step) instead of widening the policy.
        # Bun is a one-off global CLI tool pinned to an exact version, so there
        # is no project lockfile to install it from.
        run: npm install --global bun@1.3.14 # zizmor: ignore[adhoc-packages]

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Mount sticky cache
        uses: ./.github/actions/mount-sticky-cache
        with:
          key-prefix: ${{ github.repository }}-testbox-${{ github.job }}-${{ env.STICKY_CACHE_SCOPE }}
          cargo: "true"
          target: target
          browsers: "true"

      # `vp build` renders docs with a headless browser. Cache the downloads so
      # repeated warmups skip the ~150MB fetch; `--with-deps` still runs the apt
      # step on a hit, keeping system libraries in place.
      - name: Install browsers for docs rendering
        run: |
          vp exec --filter @ox-content/vite-plugin -- playwright install --with-deps chromium
          vp exec --filter @ox-content/vite-plugin -- puppeteer browsers install chrome-headless-shell

      - name: Run Testbox
        uses: useblacksmith/run-testbox@5ca05834db1d3813554d1dd109e5f2087a8d7cbc # v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
