<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230">
  <defs>
    <linearGradient id="oxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a5cff"/>
      <stop offset="100%" style="stop-color:#4acdff"/>
    </linearGradient>
    <linearGradient id="oxGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#91ede9"/>
      <stop offset="100%" style="stop-color:#b9ff66"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f607b"/>
      <stop offset="100%" style="stop-color:#8190b0"/>
    </linearGradient>
  </defs>

  <style>
    .title { font: bold 14px IBM Plex Sans, system-ui, sans-serif; fill: #131a30; }
    .label { font: 12px IBM Plex Sans, system-ui, sans-serif; fill: #4f607b; }
    .value { font: bold 11px IBM Plex Sans, system-ui, sans-serif; fill: #131a30; }
    .unit { font: 10px IBM Plex Sans, system-ui, sans-serif; fill: #8190b0; }
    .ratio { font: bold 10px IBM Plex Sans, system-ui, sans-serif; fill: #364462; }
  </style>

  <rect width="680" height="230" fill="#f5f7fb" rx="8"/>

  <text x="340" y="24" text-anchor="middle" class="title">Production Build Time</text>

  <text x="145" y="58" text-anchor="end" class="label">ox-content (default)</text>
  <rect x="155" y="45" width="145" height="20" rx="4" fill="url(#oxGrad2)"/>
  <text x="308" y="58" class="value">299ms</text>
  <text x="354" y="58" class="ratio">0.90x</text>

  <text x="145" y="88" text-anchor="end" class="label">ox-content (bare)</text>
  <rect x="155" y="75" width="161" height="20" rx="4" fill="url(#oxGrad)"/>
  <text x="324" y="88" class="value">332ms</text>
  <text x="370" y="88" class="ratio">1.00x</text>

  <text x="145" y="118" text-anchor="end" class="label">ox-content + Vue</text>
  <rect x="155" y="105" width="181" height="20" rx="4" fill="url(#oxGrad2)"/>
  <text x="344" y="118" class="value">372ms</text>
  <text x="390" y="118" class="ratio">1.12x</text>

  <text x="145" y="148" text-anchor="end" class="label">VitePress (bare)</text>
  <rect x="155" y="135" width="283" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="446" y="148" class="value">582ms</text>
  <text x="492" y="148" class="ratio">1.76x</text>

  <text x="145" y="178" text-anchor="end" class="label">VitePress (default)</text>
  <rect x="155" y="165" width="400" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="420" y="178" class="ratio" style="fill:#fff">2.48x</text>
  <text x="562" y="178" class="value">823ms</text>

  <text x="340" y="210" text-anchor="middle" class="unit">Lower is better. Average of 3 successful production builds.</text>
</svg>
