<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230">
  <defs>
    <linearGradient id="oxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a5cff"/>
      <stop offset="100%" style="stop-color:#4acdff"/>
    </linearGradient>
    <linearGradient id="oxGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#91ede9"/>
      <stop offset="100%" style="stop-color:#b9ff66"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f607b"/>
      <stop offset="100%" style="stop-color:#8190b0"/>
    </linearGradient>
  </defs>

  <style>
    .title { font: bold 14px IBM Plex Sans, system-ui, sans-serif; fill: #131a30; }
    .label { font: 12px IBM Plex Sans, system-ui, sans-serif; fill: #4f607b; }
    .value { font: bold 11px IBM Plex Sans, system-ui, sans-serif; fill: #131a30; }
    .unit { font: 10px IBM Plex Sans, system-ui, sans-serif; fill: #8190b0; }
    .ratio { font: bold 10px IBM Plex Sans, system-ui, sans-serif; fill: #364462; }
  </style>

  <rect width="680" height="230" fill="#f5f7fb" rx="8"/>

  <text x="340" y="24" text-anchor="middle" class="title">Build Output Size (Gzipped)</text>

  <text x="145" y="58" text-anchor="end" class="label">ox-content (bare)</text>
  <rect x="155" y="45" width="4" height="20" rx="2" fill="url(#oxGrad)"/>
  <text x="168" y="58" class="value">5.8 KB</text>
  <text x="214" y="58" class="ratio">1.00x</text>

  <text x="145" y="88" text-anchor="end" class="label">ox-content (default)</text>
  <rect x="155" y="75" width="14" height="20" rx="4" fill="url(#oxGrad2)"/>
  <text x="178" y="88" class="value">25.6 KB</text>
  <text x="230" y="88" class="ratio">4.41x</text>

  <text x="145" y="118" text-anchor="end" class="label">VitePress (bare)</text>
  <rect x="155" y="105" width="26" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="190" y="118" class="value">46.9 KB</text>
  <text x="242" y="118" class="ratio">8.05x</text>

  <text x="145" y="148" text-anchor="end" class="label">ox-content + Vue</text>
  <rect x="155" y="135" width="27" height="20" rx="4" fill="url(#oxGrad2)"/>
  <text x="191" y="148" class="value">47.9 KB</text>
  <text x="243" y="148" class="ratio">8.23x</text>

  <text x="145" y="178" text-anchor="end" class="label">VitePress (default)</text>
  <rect x="155" y="165" width="400" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="410" y="178" class="ratio" style="fill:#fff">123.18x</text>
  <text x="562" y="178" class="value">717.2 KB</text>

  <text x="340" y="210" text-anchor="middle" class="unit">Lower is better. Successful production builds from the local sweep.</text>
</svg>
